name: Android Build CI
on:
  push:
    branches:
      - main
    tags:
      - 'v*' # Triggers when you push a tag like v1.0.0

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  APK_PATH: android/app/build/outputs/apk/release

jobs:
  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Crucial: Allows the action to create a Release
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Install Node Dependencies
        run: npm install

      - name: Inject API Keys
        run: |
          echo "WEATHER_API_KEY=${{ secrets.WEATHER_API_KEY }}" > .env
          echo "NEWS_API_KEY=${{ secrets.NEWS_API_KEY }}" >> .env

      - name: Extract Version
        id: get_version
        run: |
          # Priority 1: Use Tag name if available. Priority 2: Extract from commit message.
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            VERSION=$(echo "${{ github.event.head_commit.message }}" | grep -oE 'v[0-9]+\.[0-9]+\.[0-9]+' | head -1)
          fi
          if [ -z "$VERSION" ]; then VERSION="v-latest"; fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Build Release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Prepare and Rename APK
        run: |
          mkdir -p ${{ env.APK_PATH }}
          if [ -f "${{ env.APK_PATH }}/app-release.apk" ]; then
            mv ${{ env.APK_PATH }}/app-release.apk ${{ env.APK_PATH }}/app-release-${{ env.VERSION }}.apk
          else
            echo "Error: app-release.apk not found"
            exit 1
          fi

      # THIS STEP MAKES THE APK VISIBLE UNDER "RELEASES"
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: Release ${{ env.VERSION }}
          files: ${{ env.APK_PATH }}/app-release-${{ env.VERSION }}.apk
          body: |
            ### 📱 New Android Build
            **Version:** ${{ env.VERSION }}
            **Changes:** ${{ github.event.head_commit.message }}
            
            Download the APK below to install on your device.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.RN_GITHUB_TOKEN }}