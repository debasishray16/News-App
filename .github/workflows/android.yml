name: Android Build CI
on:
  push:
    branches:
      - main

# Setting this globally clears the warning and opts into the newer Node version
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4 # v4 is fine, but ensure you're on latest minor

      - name: Set up JDK 17
        uses: actions/setup-java@v4 # Updated from v3 to v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Install Node Dependencies
        run: npm install

      - name: Inject API Keys
        run: |
          echo "WEATHER_API_KEY=${{ secrets.WEATHER_API_KEY }}" > .env
          echo "NEWS_API_KEY=${{ secrets.NEWS_API_KEY }}" >> .env

      - name: Extract Version
        id: get_version
        run: |
          VERSION=$(echo "${{ github.event.head_commit.message }}" | grep -oE 'v[0-9]+\.[0-9]+\.[0-9]+' | head -1)
          if [ -z "$VERSION" ]; then VERSION="v-latest"; fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Build Release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Rename APK
        run: |
          mv android/apk/release/app-release.apk android/apk/release/app-release-${{ env.VERSION }}.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4 # v4 is correct, but the env flag above handles the Node warning
        with:
          name: news-weather-app-${{ env.VERSION }}
          path: android/apk/release/app-release-${{ env.VERSION }}.apk